<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寫作小火龍老師</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM (全局 UMD 版本，避免 Error 31 實例衝突) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 以在瀏覽器中編譯 React JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 確保全螢幕高度與隱藏多餘滾動條 */
    body, html { margin: 0; padding: 0; height: 100%; }
  </style>
</head>
<body>
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { createRoot } = ReactDOM;

    // --- 內建 SVG 圖示元件 (取代外部模組，提升穩定度與載入速度) ---
    const IconBase = ({ children, className = "w-6 h-6", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );
    const Mic = (props) => <IconBase {...props}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
    const MicOff = (props) => <IconBase {...props}><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
    const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
    const Send = (props) => <IconBase {...props}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconBase>;
    const Edit3 = (props) => <IconBase {...props}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></IconBase>;
    const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
    const ScrollText = (props) => <IconBase {...props}><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M15 8h-5"/><path d="M15 12h-5"/></IconBase>;
    const ChevronRight = (props) => <IconBase {...props}><path d="m9 18 6-6-6-6"/></IconBase>;
    const CheckCircle2 = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
    const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;
    const Loader2 = (props) => <IconBase {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconBase>;
    const Sparkles = (props) => <IconBase {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconBase>;
    const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>;
    const History = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></IconBase>;
    const Star = (props) => <IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
    const ArrowLeft = (props) => <IconBase {...props}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconBase>;
    const Key = (props) => <IconBase {...props}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></IconBase>;
    const Settings = (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;


    // --- API Configuration ---
    // (不再寫死金鑰，改由畫面登入時填寫)

    // --- 輔助函數：呼叫 Gemini API ---
    const generateAIResponse = async (prompt, apiKey, isJSON = false) => {
      if (!apiKey) {
        const errMsg = "請先綁定有效的 API Key！";
        return isJSON ? { praise: "系統設定錯誤", revised: "尚未設定金鑰", reason: errMsg } : `⚠️ ${errMsg}`;
      }

      // ✨ 升級模型：全面改用最新版 gemini-2.5-flash 解決找不到舊模型的錯誤 ✨
      const isCanvas = window.location.hostname.includes("googleusercontent");
      const modelName = isCanvas ? "gemini-2.5-flash-preview-09-2025" : "gemini-2.5-flash";
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: {
          parts: [{
            text: "你是一個名叫「小火龍老師」的 AI 寫作導師，專門教導國小學童寫作。你正在教導的小朋友叫做「寶可夢作文大師塔莉」，對話中可以親切地稱呼她「塔莉」。你的個性溫暖、親切、活潑可愛，充滿活力。你的說話風格像寶可夢訓練家一樣，常使用「太棒了！」、「繼續保持！」、「讓我們一起收服這個句子吧！」等語氣。遇到問題會用引導式的問句，而不是直接給答案。所有回應都必須是繁體中文。"
          }]
        }
      };

      if (isJSON) {
        payload.generationConfig = {
          responseMimeType: "application/json",
        };
      }

      const retries = 5;
      const delays = [1000, 2000, 4000, 8000, 16000];

      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.error?.message || `未知的伺服器錯誤 (狀態碼: ${response.status})`);
          }
          
          const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
          return isJSON ? JSON.parse(textResponse) : textResponse;
          
        } catch (error) {
          if (i === retries - 1) {
            console.error("Gemini API Error after retries:", error);
            const errorMessage = error.message || "未知錯誤";
            
            // ✨ 針對 Failed to fetch 給出具體的排錯建議 ✨
            let reasonText = `詳細錯誤訊息：${errorMessage}`;
            let chatText = `哎呀！小火龍老師遇到了一點問題。錯誤訊息是：「${errorMessage}」。Angel，請檢查一下 API 金鑰喔！`;
            
            if (errorMessage.includes("Failed to fetch")) {
                reasonText = "出現 Failed to fetch！請檢查：\n1. 你的瀏覽器廣告攔截器 (AdBlock/Brave) 是否擋住了連線？請試著暫時關閉它或使用無痕模式。\n2. 你的 API 金鑰在 Google 後台是否不小心設定了「網站限制 (Referrer)」？請改為無限制。\n3. 確認設備的網路連線正常。";
                chatText = "哎呀！小火龍老師的網路被擋住了（Failed to fetch）！Angel，這通常是因為「廣告攔截器阻擋」或是「API金鑰限制了網站」造成的喔，請幫忙檢查一下！";
            }

            return isJSON 
              ? { praise: "網路連線被擋住了", revised: "連線失敗", reason: reasonText }
              : chatText;
          }
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

    // --- Web Speech API Wrapper ---
    const SpeechService = {
      speak: (text) => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.9; 
        utterance.pitch = 1.05; 
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = 
          voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Neural') || v.name.includes('Premium'))) ||
          voices.find(v => v.name.includes('HsiaoYu') || v.name.includes('Yating') || v.name.includes('Google 國語')) ||
          voices.find(v => v.lang === 'zh-TW') || 
          voices.find(v => v.lang.includes('zh'));
                          
        if (bestVoice) utterance.voice = bestVoice;
        window.speechSynthesis.speak(utterance);
      }
    };

    if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // --- 核心升級：絕對堅固的自動記憶 Hook ---
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        if (typeof window === "undefined") return initialValue;
        try {
          const item = window.localStorage.getItem(key);
          if (item !== null && item !== "undefined") {
            return JSON.parse(item);
          }
          return initialValue;
        } catch (error) {
          console.warn(`讀取記憶失敗 [${key}]:`, error);
          return initialValue;
        }
      });

      useEffect(() => {
        if (typeof window === "undefined") return;
        try {
          window.localStorage.setItem(key, JSON.stringify(storedValue));
        } catch (error) {
          console.warn(`寫入記憶失敗 [${key}]:`, error);
        }
      }, [key, storedValue]);

      return [storedValue, setStoredValue];
    }

    // --- 主要 App 組件 ---
    function App() {
      const [savedApiKey, setSavedApiKey] = useLocalStorage('pika_api_key', '');
      const [tempKey, setTempKey] = useState('');
      const [step, setStep] = useLocalStorage('pika_step', 0); 
      const [goal, setGoal] = useLocalStorage('pika_goal', '');
      const [targetWords, setTargetWords] = useLocalStorage('pika_targetWords', 0);
      const [messages, setMessages] = useLocalStorage('pika_messages', []);
      const [inputValue, setInputValue] = useLocalStorage('pika_inputValue', '');
      const [currentDraft, setCurrentDraft] = useLocalStorage('pika_currentDraft', '');
      const [reviewResult, setReviewResult] = useLocalStorage('pika_reviewResult', null);
      const [history, setHistory] = useLocalStorage('pika_history', []);
      
      const [viewingHistory, setViewingHistory] = useState(null); 
      const [isRecording, setIsRecording] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [showResetModal, setShowResetModal] = useState(false);
      
      const chatEndRef = useRef(null);
      const recognitionRef = useRef(null);

      useEffect(() => {
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = true;
          recognitionRef.current.lang = 'zh-TW';

          recognitionRef.current.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
            }
            if (finalTranscript) setInputValue(prev => prev + finalTranscript);
          };

          recognitionRef.current.onerror = () => setIsRecording(false);
          recognitionRef.current.onend = () => setIsRecording(false);
        }
      }, []);

      const toggleRecording = () => {
        if (!recognitionRef.current) {
          alert("你的瀏覽器不支援語音輸入喔！請使用 Chrome 或 Edge。");
          return;
        }
        if (isRecording) {
          recognitionRef.current.stop();
        } else {
          setInputValue('');
          recognitionRef.current.start();
          setIsRecording(true);
        }
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isLoading]);

      const startGame = (selectedGoal) => {
        setGoal(selectedGoal);
        setStep(2);
      };

      const selectWordCount = async (words) => {
        setTargetWords(words);
        setStep(3);
        setIsLoading(true);
        const prompt = `塔莉選擇了寫「${goal}」，目標字數「${words}」字。請用活潑可愛的寫作小火龍老師語氣（自稱小火龍老師），親切地呼喚塔莉的名字，並問她第一個引導問題，幫助她想好怎麼開頭。回應請保持在50字以內。`;
        const aiResponse = await generateAIResponse(prompt, savedApiKey);
        setMessages([{ role: 'ai', content: aiResponse }]);
        SpeechService.speak(aiResponse);
        setIsLoading(false);
      };

      const handleSendMessage = async () => {
        if (!inputValue.trim()) return;
        
        const newUserMessage = { role: 'user', content: inputValue };
        const newDraft = currentDraft + (currentDraft ? "，" : "") + inputValue;
        
        setMessages(prev => [...prev, newUserMessage]);
        setCurrentDraft(newDraft);
        setInputValue('');
        setIsLoading(true);

        const currentWordCount = newDraft.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').length;
        let prompt = "";

        if (currentWordCount >= targetWords) {
          prompt = `塔莉正在寫「${goal}」。目前草稿：「${newDraft}」。剛剛回答：「${inputValue}」。\n字數已經達到目標（${targetWords}字）！請大力稱讚她，並問她「塔莉，要不要直接進入批改階段，看看小火龍老師的魔法修改？」，引導她準備結束。`;
        } else {
          prompt = `塔莉正在寫「${goal}」。目標字數：${targetWords}字。目前累積草稿：「${newDraft}」。剛剛回答：「${inputValue}」。\n請給予鼓勵，並根據目前的內容，給出**一個**簡單明確的引導問題，幫助她繼續寫下一段或補充細節（例如加入五官感受、心情等）。語氣要可愛，字數50字以內。`;
        }

        const aiResponse = await generateAIResponse(prompt, savedApiKey);
        setMessages(prev => [...prev, { role: 'ai', content: aiResponse }]);
        SpeechService.speak(aiResponse);
        setIsLoading(false);
      };

      const saveToHistoryList = (resultToSave) => {
        const newEntry = {
          id: Date.now(),
          date: new Date().toLocaleDateString(),
          goal: goal,
          words: targetWords,
          original: currentDraft,
          revised: resultToSave.revised,
          praise: resultToSave.praise,
          reason: resultToSave.reason
        };
        setHistory(prev => [newEntry, ...prev].slice(0, 3));
      };

      const finishDraft = async () => {
        setStep(4);
        setIsLoading(true);
        
        const prompt = `請批改塔莉寫的「${goal}」。
目標字數：${targetWords}字。
塔莉的原文是：
「${currentDraft}」

請以JSON格式回傳，格式要求：
{
  "praise": "一句對塔莉的具體鼓勵（例如：塔莉，你把天氣形容得很生動喔！）",
  "revised": "修改後的文章（修正錯字、讓句子更通順、適度加上豐富的詞彙，但保留塔莉原本的意思）",
  "reason": "用親切可愛的語氣（自稱小火龍老師）解釋你修改了哪裡、為什麼這樣改，讓塔莉能學到東西。"
}`;

        const result = await generateAIResponse(prompt, savedApiKey, true);
        setReviewResult(result);
        
        // 確保發生錯誤時不要存入歷史紀錄
        if (result.praise !== "網路連線被擋住了" && result.praise !== "系統發生小錯誤了") {
          saveToHistoryList(result); 
        }
        
        SpeechService.speak("批改完成囉！塔莉，來看看小火龍老師給你什麼建議吧！");
        setIsLoading(false);
      };

      const handleResetClick = () => {
        setShowResetModal(true);
      };

      const confirmReset = () => {
        setStep(0);
        setGoal('');
        setTargetWords(0);
        setMessages([]);
        setInputValue('');
        setCurrentDraft('');
        setReviewResult(null);
        setViewingHistory(null);
        setShowResetModal(false);
      };

      const handleSaveArticle = (dataToSave) => {
        const data = dataToSave || {
          goal, targetWords, revised: reviewResult.revised, original: currentDraft, praise: reviewResult.praise, reason: reviewResult.reason
        };
        
        const content = `【塔莉的寫作挑戰】
目標：${data.goal} (${data.targetWords || data.words}字)
日期：${new Date().toLocaleDateString()}

--- ✨ 小火龍潤飾版 ✨ ---
${data.revised}

--- 📝 塔莉的原文 ---
${data.original}

--- 🐲 小火龍老師的評語 ---
${data.praise}
${data.reason}
`;

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `塔莉的${data.goal}_${new Date().toISOString().slice(0,10)}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const PokeButton = ({ onClick, children, icon: Icon, colorClass = "bg-white text-gray-800 hover:bg-gray-50" }) => (
        <button 
          onClick={onClick}
          className={`w-full flex items-center justify-between p-4 rounded-2xl shadow-[0_4px_0_0_rgba(0,0,0,0.1)] active:shadow-none active:translate-y-1 transition-all border-2 border-gray-100 font-bold text-lg ${colorClass}`}
        >
          <div className="flex items-center gap-3">
            {Icon && <Icon className="w-6 h-6" />}
            <span>{children}</span>
          </div>
          <ChevronRight className="w-5 h-5 text-gray-400" />
        </button>
      );

      return (
        <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-yellow-100 via-orange-50 to-red-100 flex items-center justify-center p-2 sm:p-4 font-sans text-gray-800">
          
          {!savedApiKey ? (
            <div className="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl border-8 border-white flex flex-col items-center animate-in zoom-in duration-300">
              <div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-6 shadow-inner border-4 border-red-100 text-red-500">
                <Key className="w-12 h-12" />
              </div>
              <h2 className="text-2xl font-black mb-2 text-gray-800">喚醒小火龍老師</h2>
              <p className="text-sm text-gray-500 mb-6 text-center font-medium leading-relaxed">
                無敵Angel，請輸入小火龍老師的魔法金鑰 (API Key)。<br/><span className="text-red-500">金鑰只會安全地儲存在你的設備上喔！</span>
              </p>
              <input 
                type="password" 
                value={tempKey} 
                onChange={(e) => setTempKey(e.target.value)} 
                placeholder="AIzaSy..." 
                className="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl px-5 py-4 mb-6 outline-none focus:ring-2 focus:ring-red-400 focus:border-red-400 transition-all font-mono" 
              />
              <button 
                onClick={() => setSavedApiKey(tempKey)} 
                disabled={!tempKey.trim()} 
                className="w-full py-4 bg-red-500 text-white font-bold text-lg rounded-2xl shadow-[0_4px_0_0_#b91c1c] active:translate-y-1 active:shadow-none transition-all disabled:opacity-50 disabled:bg-gray-300 disabled:shadow-none"
              >
                確認綁定
              </button>
            </div>
          ) : (
          <div className="w-full max-w-md bg-white h-[85vh] sm:h-[90vh] max-h-[800px] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col border-8 border-white relative">
            
            {showResetModal && (
              <div className="absolute inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 animate-in fade-in zoom-in duration-200">
                <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl flex flex-col items-center text-center border-4 border-white outline outline-4 outline-red-100">
                  <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4 shadow-inner">
                    <RotateCcw className="w-8 h-8 text-red-500" />
                  </div>
                  <h3 className="text-xl font-black text-gray-800 mb-2">確定要重新開始嗎？</h3>
                  <p className="text-gray-500 mb-6 font-medium text-[15px]">目前的草稿和對話紀錄都會被清除，塔莉準備好迎接新挑戰了嗎？</p>
                  <div className="flex gap-3 w-full">
                    <button
                      onClick={() => setShowResetModal(false)}
                      className="flex-1 py-3.5 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 transition-colors"
                    >
                      取消
                    </button>
                    <button
                      onClick={confirmReset}
                      className="flex-1 py-3.5 bg-red-500 text-white font-bold rounded-2xl shadow-[0_4px_0_0_#b91c1c] active:shadow-none active:translate-y-1 transition-all"
                    >
                      確定重來
                    </button>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-gradient-to-r from-red-500 to-red-600 pt-6 pb-4 px-6 rounded-t-[2rem] shadow-md z-10 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1/2 bg-white/10 rounded-b-full transform -translate-y-1/2"></div>
              
              <div className="flex justify-between items-center text-white relative z-10">
                <h1 className="text-xl font-black tracking-wider flex items-center gap-2">
                  <span className="text-3xl animate-[bounce_3s_infinite] drop-shadow-md">🐲</span> 
                  寫作小火龍
                </h1>
                <div className="flex items-center gap-1">
                  <button onClick={() => { setTempKey(savedApiKey); setSavedApiKey(''); }} className="p-2 bg-white/20 rounded-full hover:bg-white/30 backdrop-blur-sm transition-all active:scale-90" title="更換金鑰">
                    <Settings className="w-5 h-5" />
                  </button>
                  {step > 0 && (
                    <button onClick={handleResetClick} className="p-2 bg-white/20 rounded-full hover:bg-white/30 backdrop-blur-sm transition-all active:scale-90" title="重新開始">
                      <RotateCcw className="w-5 h-5" />
                    </button>
                  )}
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto bg-slate-50/80 relative">
              
              {step === 0 && (
                <div className="p-6 flex flex-col h-full animate-in fade-in zoom-in duration-500 overflow-y-auto">
                  <div className="flex flex-col items-center justify-center mt-4 mb-6">
                    <div className="w-32 h-32 bg-gradient-to-br from-yellow-100 to-yellow-300 rounded-full flex items-center justify-center mb-4 shadow-inner border-4 border-yellow-400 relative">
                      <Sparkles className="absolute top-2 right-2 text-yellow-500 w-6 h-6 animate-pulse" />
                      <span className="text-6xl animate-bounce drop-shadow-lg" style={{animationDuration: '2s'}}>🐲</span>
                    </div>
                    <h2 className="text-2xl font-black mb-2 text-center text-red-600 drop-shadow-sm">嗨！寶可夢大師塔莉！</h2>
                    <p className="text-gray-600 text-center font-medium bg-white px-4 py-2 rounded-2xl shadow-sm border border-gray-100">
                      今天你想挑戰收服什麼文章呢？✨
                    </p>
                  </div>
                  
                  <div className="w-full space-y-4 mb-8">
                    <PokeButton onClick={() => startGame('故事')} icon={BookOpen} colorClass="bg-blue-50 text-blue-700 border-blue-200">
                      寫一篇精彩的故事
                    </PokeButton>
                    <PokeButton onClick={() => startGame('日記')} icon={Edit3} colorClass="bg-green-50 text-green-700 border-green-200">
                      寫一篇生活日記
                    </PokeButton>
                    <PokeButton onClick={() => startGame('讀書心得')} icon={ScrollText} colorClass="bg-purple-50 text-purple-700 border-purple-200">
                      寫一篇讀書心得
                    </PokeButton>
                  </div>

                  {history.length > 0 && (
                    <div className="mt-auto pb-4">
                      <div className="flex items-center gap-2 mb-3 px-2">
                        <History className="w-5 h-5 text-orange-500" />
                        <h3 className="font-bold text-gray-700">作品收藏匣 (最近 {history.length} 篇)</h3>
                      </div>
                      <div className="space-y-3">
                        {history.map((item) => (
                          <button 
                            key={item.id}
                            onClick={() => { setViewingHistory(item); setStep(5); }}
                            className="w-full bg-white p-4 rounded-2xl shadow-sm border border-orange-100 flex items-center justify-between hover:shadow-md transition-all text-left group"
                          >
                            <div>
                              <div className="flex items-center gap-2 mb-1">
                                <Star className="w-4 h-4 text-yellow-400 fill-yellow-400" />
                                <span className="font-bold text-orange-800">{item.goal}挑戰</span>
                              </div>
                              <div className="text-xs text-gray-400">{item.date} • {item.words}字目標</div>
                            </div>
                            <ChevronRight className="w-5 h-5 text-orange-300 group-hover:translate-x-1 transition-transform" />
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {step === 2 && (
                <div className="p-6 flex flex-col h-full animate-in slide-in-from-right duration-300">
                  <h2 className="text-xl font-bold mb-2 text-center text-gray-800 flex items-center justify-center gap-2">
                    <span className="text-2xl">🎯</span> 設定訓練目標！
                  </h2>
                  <p className="text-center text-gray-500 mb-6 text-sm">塔莉，這次你想挑戰寫幾個字呢？</p>
                  
                  <div className="grid grid-cols-2 gap-4">
                    {[50, 100, 150, 200, 300, 500].map(words => (
                      <button
                        key={words}
                        onClick={() => selectWordCount(words)}
                        className="bg-white border-2 border-orange-100 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:border-orange-400 hover:bg-orange-50 transition-all active:scale-95"
                      >
                        <div className="bg-gradient-to-br from-yellow-200 to-yellow-400 text-yellow-900 font-black text-xl px-4 py-1 rounded-full shadow-inner">
                          {words}
                        </div>
                        <span className="text-gray-500 font-bold text-sm">字</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {step === 3 && (
                <div className="flex flex-col h-full bg-slate-50">
                  <div className="bg-white px-4 py-3 shadow-sm flex items-center gap-3 sticky top-0 z-10 border-b border-gray-100">
                    <div className="flex-1 bg-gray-100 h-5 rounded-full overflow-hidden border border-gray-200 shadow-inner">
                      <div 
                        className="bg-gradient-to-r from-green-400 to-emerald-500 h-full transition-all duration-500 relative flex items-center justify-end px-2"
                        style={{ width: `${Math.max(5, Math.min((currentDraft.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').length / targetWords) * 100, 100))}%` }}
                      >
                        <div className="absolute inset-0 bg-white/20" style={{ backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.3) 10px, rgba(255,255,255,0.3) 20px)'}}></div>
                      </div>
                    </div>
                    <div className="text-sm font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg">
                      {currentDraft.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').length} / {targetWords}
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto p-4 space-y-4">
                    {messages.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.role === 'ai' ? 'justify-start' : 'justify-end'}`}>
                        {msg.role === 'ai' && (
                          <div className="w-9 h-9 bg-gradient-to-br from-red-100 to-red-200 rounded-full flex items-center justify-center mr-2 text-xl shrink-0 border-2 border-white shadow-sm self-end mb-1">
                            🐲
                          </div>
                        )}
                        <div className={`max-w-[75%] rounded-2xl px-4 py-3 text-[15px] leading-relaxed shadow-sm ${
                          msg.role === 'ai' 
                            ? 'bg-white text-gray-800 border border-gray-100 rounded-bl-none' 
                            : 'bg-gradient-to-br from-yellow-300 to-yellow-400 text-yellow-950 font-medium rounded-br-none'
                        }`}>
                          {msg.content}
                          {msg.role === 'ai' && (
                            <button 
                              onClick={() => SpeechService.speak(msg.content)}
                              className="mt-2 text-gray-400 hover:text-red-500 flex items-center gap-1 text-xs bg-gray-50 px-2 py-1 rounded-full w-fit transition-colors"
                            >
                              <Volume2 className="w-3 h-3" /> 再聽一次
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                    
                    {isLoading && (
                      <div className="flex justify-start items-end">
                        <div className="w-9 h-9 bg-gradient-to-br from-red-100 to-red-200 rounded-full flex items-center justify-center mr-2 text-xl shrink-0 border-2 border-white shadow-sm mb-1">🐲</div>
                        <div className="bg-white rounded-2xl rounded-bl-none px-4 py-4 flex gap-1.5 items-center shadow-sm border border-gray-100">
                          <div className="w-2.5 h-2.5 bg-red-300 rounded-full animate-bounce"></div>
                          <div className="w-2.5 h-2.5 bg-red-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                          <div className="w-2.5 h-2.5 bg-red-500 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                        </div>
                      </div>
                    )}
                    <div ref={chatEndRef} />
                  </div>

                  <div className="bg-white p-3 border-t border-gray-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <div className="flex items-end gap-2">
                      <button
                        onClick={toggleRecording}
                        className={`p-3.5 rounded-2xl shrink-0 transition-all ${
                          isRecording 
                            ? 'bg-red-500 text-white animate-pulse shadow-lg shadow-red-200 scale-105' 
                            : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                        }`}
                      >
                        {isRecording ? <Mic className="w-6 h-6" /> : <MicOff className="w-6 h-6" />}
                      </button>
                      
                      <textarea
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        placeholder={isRecording ? "塔莉，請說話..." : "輸入你的想法..."}
                        className="flex-1 bg-gray-100 rounded-2xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white transition-colors resize-none text-[15px]"
                        rows={1}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleSendMessage();
                          }
                        }}
                      />
                      
                      <button
                        onClick={handleSendMessage}
                        disabled={!inputValue.trim() || isLoading}
                        className="p-3.5 bg-blue-500 text-white rounded-2xl shrink-0 hover:bg-blue-600 disabled:opacity-50 disabled:bg-gray-300 transition-all shadow-md active:scale-95"
                      >
                        <Send className="w-5 h-5 ml-1" />
                      </button>
                    </div>
                    
                    {currentDraft && (
                      <button 
                        onClick={finishDraft}
                        disabled={isLoading}
                        className="w-full mt-3 py-3 bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold rounded-xl shadow-[0_4px_0_0_rgba(16,185,129,1)] hover:shadow-[0_2px_0_0_rgba(16,185,129,1)] hover:translate-y-[2px] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2"
                      >
                        <Sparkles className="w-5 h-5" />
                        我寫完了！請小火龍老師批改
                      </button>
                    )}
                  </div>
                </div>
              )}

              {(step === 4 || step === 5) && (
                <div className="p-5 h-full overflow-y-auto animate-in fade-in duration-500 pb-20 bg-slate-50">
                  {step === 5 && (
                    <button onClick={() => setStep(0)} className="mb-4 flex items-center gap-1 text-gray-500 hover:text-orange-500 font-bold transition-colors">
                      <ArrowLeft className="w-5 h-5" /> 返回首頁
                    </button>
                  )}

                  <h2 className="text-2xl font-black text-center text-gray-800 mb-8 flex items-center justify-center gap-2 drop-shadow-sm">
                    <CheckCircle2 className="w-8 h-8 text-green-500" />
                    {step === 4 ? "任務完成！" : "滿分作品回顧"}
                  </h2>
                  
                  {(!reviewResult && step === 4) ? (
                    <div className="flex flex-col items-center justify-center py-16 space-y-6">
                      <div className="relative">
                        <Loader2 className="w-16 h-16 text-red-500 animate-spin" />
                        <span className="absolute inset-0 flex items-center justify-center text-2xl">🐲</span>
                      </div>
                      <p className="text-gray-600 font-bold bg-white px-6 py-2 rounded-full shadow-sm animate-pulse">
                        小火龍老師正在施展修改魔法...✨
                      </p>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      {(()=>{
                        const data = step === 5 ? viewingHistory : reviewResult;
                        const draft = step === 5 ? viewingHistory.original : currentDraft;
                        if(!data) return null;
                        return (
                          <>
                            <div className="bg-gradient-to-br from-yellow-50 to-orange-50 border-2 border-yellow-200 rounded-3xl p-6 relative mt-6 shadow-sm">
                              <div className="absolute -top-8 left-4 text-5xl drop-shadow-md animate-bounce" style={{animationDuration: '3s'}}>🐲</div>
                              <div className="ml-8">
                                <h3 className="text-yellow-800 font-black mb-2 flex items-center gap-2">
                                  <Star className="w-5 h-5 fill-yellow-500 text-yellow-500"/>
                                  小火龍老師說：
                                </h3>
                                <p className="text-yellow-900 font-medium leading-relaxed text-[15px]">
                                  {data.praise}
                                </p>
                              </div>
                            </div>

                            <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-3xl p-6 border-2 border-blue-100 shadow-sm">
                              <h3 className="text-blue-800 font-black mb-3 flex items-center gap-2">
                                <Sparkles className="w-5 h-5 text-blue-500" />
                                魔法筆記
                              </h3>
                              <p className="text-blue-900 leading-relaxed text-sm font-medium">
                                {data.reason}
                              </p>
                            </div>

                            <div className="space-y-5">
                              <div className="relative">
                                <div className="absolute -left-2 top-4 w-1 h-12 bg-gray-300 rounded-full"></div>
                                <div className="text-sm font-bold text-gray-500 mb-2 ml-2">📝 塔莉的原文：</div>
                                <div className="bg-gray-100 rounded-2xl p-5 text-gray-500 text-[15px] leading-relaxed border border-gray-200 shadow-inner">
                                  {draft}
                                </div>
                              </div>
                              
                              <div className="relative">
                                <div className="absolute -left-2 top-4 w-1 h-12 bg-green-400 rounded-full"></div>
                                <div className="text-sm font-bold text-green-600 mb-2 ml-2 flex items-center gap-1">
                                  ✨ 小火龍潤飾版：
                                </div>
                                <div className="bg-white rounded-2xl p-6 text-gray-800 text-[16px] font-medium leading-relaxed shadow-md border-2 border-green-200 relative overflow-hidden">
                                  <div className="absolute top-0 right-0 w-20 h-20 bg-gradient-to-bl from-green-100 to-transparent rounded-bl-full opacity-50 -z-10"></div>
                                  {data.revised}
                                </div>
                              </div>
                            </div>

                            <div className="flex gap-3 mt-10">
                              <button 
                                onClick={() => handleSaveArticle(data)}
                                className="flex-1 py-4 bg-gradient-to-b from-blue-400 to-blue-500 text-white font-bold text-lg rounded-2xl shadow-[0_4px_0_0_#1e3a8a] active:shadow-none active:translate-y-1 transition-all flex justify-center items-center gap-2"
                              >
                                <Download className="w-5 h-5" />
                                儲存文章
                              </button>
                              
                              {step === 4 && (
                                <button 
                                  onClick={() => setStep(0)} 
                                  className="flex-1 py-4 bg-gradient-to-b from-red-400 to-red-500 text-white font-bold text-lg rounded-2xl shadow-[0_4px_0_0_#7f1d1d] active:shadow-none active:translate-y-1 transition-all flex justify-center items-center"
                                >
                                  回首頁
                                </button>
                              )}
                            </div>
                          </>
                        )
                      })()}
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>
          )}
        </div>
      );
    }

    // 將 App 渲染到畫面上
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
